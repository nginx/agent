name: CI

on:
  push:
    branches:
    - 'dev-v2'
    - 'release-*'
    paths-ignore:
    - "**.md"
    - "docs/**"
    - "hugo/**"
  pull_request:
    types:
    - opened
    - reopened
    - synchronize

permissions:
  contents: read

env:
  GOLANGCI_LINT_VERSION: 'v2.10.1'
  NFPM_VERSION: 'v2.35.3'
  NGINX_OSS_REGISTRY: 'docker-registry.nginx.com'

jobs:
  lint:
    permissions:
      contents: read  # for actions/checkout to fetch code
      pull-requests: read  # for golangci/golangci-lint-action to fetch pull requests
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Lint Agent Code
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"
          args: -c ./scripts/.golangci.yml
          skip-cache: true
      - name: Lint SDK Code
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v8.0.0
        with:
          version: "${{ env.GOLANGCI_LINT_VERSION }}"
          working-directory: sdk
          args: -c ../scripts/.golangci.yml
          skip-cache: true

  vulnerability-scan:
    name: Vulnerability Scan
    uses: ./.github/workflows/vulncheck.yml
    permissions:
      contents: read
      security-events: write # for reporting vulnerabilities via code-scanning API
    with:
      # Use PR head SHA for pull requests (supports PRs from forks).
      # Fallback to ref name for other contexts.
      target-branch: ${{ github.event.pull_request.head.sha || github.ref_name }}

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
            go-version-file: 'go.mod'
      - name: Set Start Time
        run: echo "START_TIME=$(date +"%Y-%m-%dT%H:%M:%S.%NZ")" >> ${GITHUB_ENV}
      - name: Create Directory
        run: mkdir -p ${{github.workspace}}/test/dashboard/logs/${{github.job}}/
      - name: Start Promtail
        uses: ./.github/actions/start-promtail
        with:
            loki-dashboard-url: ${{ secrets.LOKI_DASHBOARD_URL }}
      - name: Run Unit Tests
        run: make unit-test | tee ${{github.workspace}}/test/dashboard/logs/${{github.job}}/raw_logs.log && exit "${PIPESTATUS[0]}"
      - name: Generate Test Results
        if: always()
        run: bash ./scripts/workflow/generate_results.sh ${{job.status}} ${{env.START_TIME}} ${{github.job}} ${{github.workspace}}
      - name: Upload Test Coverage
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: ./build/test/coverage.out

  component-test:
    name: Component Tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Run Component Tests
        run: make component-test

  build-unsigned-snapshot:
    name: Build unsigned snapshot
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Setup build environment
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build Docker Image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          file: scripts/packages/packager/Dockerfile
          tags: build-local-packager:1.0.0
          context: '.'
          push: false
          load: true
          no-cache: true
          build-args: |
            package_type=local-package
      - name: Build Packages
        run: |
            make clean local-deb-package local-rpm-package local-txz-package local-apk-package
      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nginx-agent-unsigned-snapshots
          path: build
          retention-days: 1

  integration-tests:
      name: Integration Tests
      needs: build-unsigned-snapshot
      runs-on: ubuntu-24.04
      strategy:
          fail-fast: false
          matrix:
              container:
                  - image: "rockylinux"
                    version: "8"
                  - image: "rockylinux"
                    version: "9"
                  - image: "almalinux"
                    version: "8"
                  - image: "almalinux"
                    version: "9"
                  - image: "amazonlinux"
                    version: "2"
                  - image: "amazonlinux"
                    version: "2023"
                  - image: "oraclelinux"
                    version: "8"
                  - image: "oraclelinux"
                    version: "9"
                  - image: "ubuntu"
                    version: "24.04"
                  - image: "alpine"
                    version: "3.20"
                  - image: "alpine"
                    version: "3.21"
                  - image: "alpine"
                    version: "3.22"
                  - image: "alpine"
                    version: "3.23"
                  - image: "debian"
                    version: "bullseye-slim"
                  - image: "debian"
                    version: "bookworm-slim"
      steps:
          - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            with:
                fetch-depth: 0
          - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
            with:
                go-version-file: 'go.mod'
          - name: Download Packages
            uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
            with:
                name: nginx-agent-unsigned-snapshots
                path: build
          - name: Set Start Time
            run: echo "START_TIME=$(date +"%Y-%m-%dT%H:%M:%S.%NZ")" >> ${GITHUB_ENV}
          - name: Create Directory
            run: mkdir -p ${{github.workspace}}/test/dashboard/logs/${{github.job}}/${{matrix.container.image}}${{matrix.container.version}}/
          - name: Start Promtail
            uses: ./.github/actions/start-promtail
            with:
                loki-dashboard-url: ${{ secrets.LOKI_DASHBOARD_URL }}
          - name: Run Integration Tests
            run: |
                go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}
                OS_RELEASE="${{ matrix.container.image }}" OS_VERSION="${{ matrix.container.version }}" \
                  make integration-test | tee ${{github.workspace}}/test/dashboard/logs/${{github.job}}/${{matrix.container.image}}${{matrix.container.version}}/raw_logs.log && exit "${PIPESTATUS[0]}"
          - name: Generate Test Results
            if: always()
            run: bash ./scripts/workflow/generate_results.sh ${{job.status}} ${{env.START_TIME}} ${{github.job}}/${{matrix.container.image}}${{matrix.container.version}} ${{github.workspace}}
          - name: Container Output Logs
            if: failure()
            run: |
                docker ps -a
                dockerid=$(docker ps -a --format "{{.ID}}")
                docker logs "$dockerid"
                
          - name: Archive integration test logs
            if: success() || failure()
            uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
            with:
                name: integration-test-logs-${{ matrix.container.image }}-${{ matrix.container.version }}
                path: /tmp/integration-test-logs/
                retention-days: 3

  official-oss-image-integration-tests:
    name: Integration Tests - Official OSS Images
    needs: build-unsigned-snapshot
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.head.repo.fork && !startsWith(github.ref_name, 'dependabot/') }}
    strategy:
      fail-fast: false
      matrix:
        container:
        - image: "bookworm"
          version: "stable"
          release: "debian"
        - image: "bookworm"
          version: "mainline"
          release: "debian"
        - image: "alpine"
          version: "stable"
          release: "alpine"
        - image: "alpine"
          version: "mainline"
          release: "alpine"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Download Packages
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: nginx-agent-unsigned-snapshots
          path: build
      - name: Set Start Time
        run: echo "START_TIME=$(date +"%Y-%m-%dT%H:%M:%S.%NZ")" >> ${GITHUB_ENV}
      - name: Create Directory
        run: mkdir -p ${{github.workspace}}/test/dashboard/logs/${{github.job}}/${{matrix.container.image}}${{matrix.container.version}}/
      - name: Start Promtail
        uses: ./.github/actions/start-promtail
        with:
            loki-dashboard-url: ${{ secrets.LOKI_DASHBOARD_URL }}
      - name: Run Integration Tests
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}
          CONTAINER_NGINX_IMAGE_REGISTRY="${{ env.NGINX_OSS_REGISTRY }}" TAG="${{ matrix.container.version }}-${{ matrix.container.image }}" OS_RELEASE="${{ matrix.container.release }}"\
            make official-image-integration-test | tee ${{github.workspace}}/test/dashboard/logs/${{github.job}}/${{matrix.container.image}}${{matrix.container.version}}/raw_logs.log && exit "${PIPESTATUS[0]}"
      - name: Generate Test Results
        if: always()
        run: bash ./scripts/workflow/generate_results.sh ${{job.status}} ${{env.START_TIME}} ${{github.job}}/${{matrix.container.image}}${{matrix.container.version}} ${{github.workspace}}
      - name: Container Output Logs 
        if: failure()
        run: |
          docker ps -a
          dockerid=$(docker ps -a --format "{{.ID}}")
          docker logs "$dockerid"

      - name: Archive integration test logs
        if: success() || failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: official-oss-integration-test-logs-${{ matrix.container.image }}-${{ matrix.container.version }}
          path: /tmp/integration-test-logs/
          retention-days: 3
  official-plus-image-integration-tests:
      name: Integration Tests - Official Plus Images
      needs: build-unsigned-snapshot
      runs-on: ubuntu-24.04
      permissions:
          id-token: write  # for OIDC authentication
      if: ${{ !github.event.pull_request.head.repo.fork && !startsWith(github.ref_name, 'dependabot/') }}
      strategy:
          fail-fast: false
          matrix:
              container:
                  -   image: "alpine"
                      version: "3.20"
                      plus: "r32"
                      release: "alpine"
                      path: "/nginx-plus/agent"
                  -   image: "debian"
                      version: "bookworm"
                      plus: "r32"
                      release: "debian"
                      path: "/nginx-plus/agent"
                  -   image: "debian"
                      version: "bookworm"
                      plus: "r31"
                      release: "debian"
                      path: "/nginx-plus/agent"
      steps:
          -   uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0
          -   uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: 'go.mod'
          -   name: Download Packages
              uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
              with:
                  name: nginx-agent-unsigned-snapshots
                  path: build

          -   name: Get Secrets from Agent Key Vault
              uses: ./.github/actions/az-sync
              with:
                  az_client_id: ${{ secrets.AZ_KEYVAULT_CLIENT_ID }}
                  az_tenant_id: ${{ secrets.AZ_KEYVAULT_TENANT_ID }}
                  az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
                  keyvault: ${{ secrets.AZ_KEYVAULT_AGENT }}
                  secrets-filter: 'artifactory'

          -   name: Sync Secrets from Common Key Vault
              uses: ./.github/actions/az-sync
              with:
                  az_client_id: ${{ secrets.AZ_KEYVAULT_CLIENT_ID }}
                  az_tenant_id: ${{ secrets.AZ_KEYVAULT_TENANT_ID }}
                  az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
                  keyvault: ${{ secrets.AZ_KEYVAULT_COMMON }}
                  secrets-filter: 'docker,nginx-private-registry,nginx-pkg'

          -   name: Login to Docker Registry
              uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
              with:
                  registry: ${{ env.nginx-private-registry-url }}
                  username: ${{ env.nginx-pkg-jwt }}
                  password: "none"

          -   name: Set Start Time
              run: echo "START_TIME=$(date +"%Y-%m-%dT%H:%M:%S.%NZ")" >> ${GITHUB_ENV}
          -   name: Create Directory
              run: mkdir -p ${{github.workspace}}/test/dashboard/logs/${{github.job}}/${{matrix.container.image}}${{matrix.container.version}}/
          -   name: Start Promtail
              uses: ./.github/actions/start-promtail
              with:
                  loki-dashboard-url: ${{ secrets.LOKI_DASHBOARD_URL }}
          -   name: Run Integration Tests
              run: |
                  go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}
                  CONTAINER_NGINX_IMAGE_REGISTRY="${{ env.nginx-private-registry-url }}" TAG="${{ matrix.container.plus }}-${{ matrix.container.image }}-${{ matrix.container.version }}" \
                  OS_RELEASE="${{ matrix.container.release }}" IMAGE_PATH="${{ matrix.container.path }}" \
                    make official-image-integration-test | tee ${{github.workspace}}/test/dashboard/logs/${{github.job}}/${{matrix.container.image}}${{matrix.container.version}}/raw_logs.log && exit "${PIPESTATUS[0]}"
          -   name: Generate Test Results
              if: always()
              run: bash ./scripts/workflow/generate_results.sh ${{job.status}} ${{env.START_TIME}} ${{github.job}}/${{matrix.container.image}}${{matrix.container.version}} ${{github.workspace}}
          -   name: Container Output Logs
              if: failure()
              run: |
                  docker ps -a
                  dockerid=$(docker ps -a --format "{{.ID}}")
                  docker logs "$dockerid"

          -   name: Archive integration test logs
              if: success() || failure()
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
              with:
                  name: official-plus-integration-test-logs-${{ matrix.container.image }}-${{ matrix.container.version }}-${{ matrix.container.plus }}
                  path: /tmp/integration-test-logs/
                  retention-days: 3
  performance-test:
    name: Performance Tests
    if: ${{ !github.event.pull_request.head.repo.fork && !startsWith(github.ref_name, 'dependabot/') }}
    runs-on: ubuntu-22.04
    permissions:
      id-token: write  # for OIDC authentication
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Docker Build
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Sync Secrets from Common Key Vault
        uses: ./.github/actions/az-sync
        with:
          az_client_id: ${{ secrets.AZ_KEYVAULT_CLIENT_ID }}
          az_tenant_id: ${{ secrets.AZ_KEYVAULT_TENANT_ID }}
          az_subscription_id: ${{ secrets.AZ_SUBSCRIPTION_ID }}
          keyvault: ${{ secrets.AZ_KEYVAULT_COMMON }}
          secrets-filter: 'nginx-pkg'
      - name: Build Docker Image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          file: test/docker/performance/Dockerfile
          tags: nginx-agent-benchmark:1.0.0
          context: '.'
          push: false
          load: true
          no-cache: true
          secrets: |
            "nginx-crt=${{ env.nginx-pkg-certificate}}"
            "nginx-key=${{ env.nginx-pkg-key }}"
      - name: Run Performance Tests
        run: docker run -v ${GITHUB_WORKSPACE}:/home/nginx/ --rm nginx-agent-benchmark:1.0.0

  build-signed-snapshot:
    name: Build signed snapshot
    runs-on: ubuntu-22.04
    if: ${{ !startsWith(github.ref_name, 'release-') && !startsWith(github.ref_name, 'dependabot/') && !github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y gpgv1 monkeysphere 
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build Docker Image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5.4.0
        with:
          file: scripts/packages/packager/Dockerfile
          tags: build-signed-packager:1.0.0
          context: '.'
          push: false
          load: true
          no-cache: true
          build-args: |
            package_type=signed-package
      - name: Build Packages
        run: |
          make clean package
      - name: Upload Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: nginx-agent-signed-snapshots
          path: ./build/azure/packages/nginx-agent.tar.gz
          retention-days: 1
      - name: Azure Login
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Azure Upload Snapshot
        uses: azure/CLI@9f7ce6f37c31b777ec6c6b6d1dfe7db79f497956 # v2.2.0
        with:
          inlineScript: |
            if ${{ github.event_name == 'pull_request'}}; then
              GIT_BRANCH=${GITHUB_HEAD_REF}
            else 
              GIT_BRANCH=${GITHUB_REF##*/}
            fi
            for i in ./build/azure/packages/nginx-agent*; do 
              az storage blob upload --auth-mode=login -f "$i" -c ${{ secrets.AZURE_CONTAINER_NAME }} \
              --account-name ${{ secrets.AZURE_ACCOUNT_NAME }} --overwrite -n nginx-agent/${GIT_BRANCH}/${i##*/}
            done

  build-example:
    name: Build Grafana Dashboard Example
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
      - name: Setup build environment
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@${{ env.NFPM_VERSION }}
      - name: Build Grafana example
        run: make build-grafana-example
      - name: Clean Grafana example
        run: make clean-grafana-example
